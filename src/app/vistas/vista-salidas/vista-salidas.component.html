<div class="vista-icem">
  <div class="header">
    <div class="sub-header">
      <div class="title-holder">
        <h1 class="center-ver" >Salidas</h1>
      </div>
      <div class="long-auto">
        <auto-icem placeholder="Filtrar Salidas" (keyup)="applyFilter($event)" [filters]="filters" [filteredFilters]="filteredFilters"></auto-icem>
      </div>
    </div>
    <div class="bar">
      <div></div>
      <div class="filter-holder center-ver">
        <div>
          <mat-form-field appearance="outline">
            <mat-label>Ingresa un rango de fecha</mat-label>
            <mat-date-range-input [rangePicker]="picker" >
                <input matStartDate placeholder="Start date" [(ngModel)]="fecha1">
                <input matEndDate placeholder="End date" [(ngModel)]="fecha2">
            </mat-date-range-input>
            <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
            <mat-date-range-picker #picker></mat-date-range-picker>
          </mat-form-field>
        </div>
        <mat-form-field appearance="outline" >
          <mat-label>Tipo de orden</mat-label>
          <mat-select [(ngModel)]="tipo">
              <mat-option value="Ambas">Ambas</mat-option>
              <mat-option value="Integración">Integración</mat-option>
              <mat-option value="Detalle">Detalle</mat-option>
          </mat-select>
        </mat-form-field>
      
      <button class="main-cta" (click)="buscar()">
          <mat-icon >history</mat-icon>
          Buscar
      </button>
    </div>
  
  </div>
  </div>
  <div style="height: 100%;overflow-y: scroll;">
    <tabla-salidas
        [showProyecto]="false"
        [dataSource]="s.dataSource"
        [displayedColumns]="s.displayedColumns">
      </tabla-salidas>
  </div>

</div>
